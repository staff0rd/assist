commit:
  conventional: true
  pull: true
  push: true
  expectedBranch: main
devlog:
  name: assist
notify:
  enabled: false
run:
  - name: verify:python-lint
    command: uv
    filter: src/commands/voice/python/**
    env:
      UV_PROJECT_ENVIRONMENT: ~/.assist/voice/.venv
    args:
      - run
      - --project
      - src/commands/voice/python
      - --extra
      - dev
      - ruff
      - check
      - src/commands/voice/python
  - name: verify:python-format
    command: uv
    filter: src/commands/voice/python/**
    env:
      UV_PROJECT_ENVIRONMENT: ~/.assist/voice/.venv
    args:
      - run
      - --project
      - src/commands/voice/python
      - --extra
      - dev
      - ruff
      - format
      - src/commands/voice/python
  - name: verify:maintainability-python
    command: uv
    filter: src/commands/voice/python/**
    env:
      UV_PROJECT_ENVIRONMENT: ~/.assist/voice/.venv
    args:
      - run
      - --project
      - src/commands/voice/python
      - --extra
      - dev
      - xenon
      - src/commands/voice/python
      - --max-absolute
      - C
  - name: verify:python-maintainability
    command: uv
    filter: src/commands/voice/python/**
    env:
      UV_PROJECT_ENVIRONMENT: ~/.assist/voice/.venv
    args:
      - run
      - --project
      - src/commands/voice/python
      - --extra
      - dev
      - python
      - src/commands/voice/python/check_mi.py
  - name: verify:lint
    command: npm
    filter: "{src/**,*.ts}"
    args:
      - run
      - --silent
      - verify:lint
  - name: verify:format
    command: npm
    args:
      - run
      - --silent
      - verify:format
  - name: verify:build
    command: npm
    args:
      - run
      - --silent
      - build
  - name: verify:types
    command: npm
    filter: "{src/**/*.ts,src/**/*.tsx,tsconfig.json}"
    args:
      - run
      - --silent
      - check:types
  - name: verify:knip
    command: npm
    filter: "{src/**/*.ts,src/**/*.tsx,package.json,knip.json}"
    args:
      - run
      - --silent
      - verify:knip
  - name: verify:duplicate-code
    command: npm
    filter: "{src/**/*.ts,src/**/*.tsx,src/**/*.py}"
    args:
      - run
      - --silent
      - verify:duplicate-code
  - name: verify:maintainability-typescript
    command: assist
    filter: "{src/**/*.ts,src/**/*.tsx}"
    args:
      - complexity
      - maintainability
      - ./src
      - --threshold
      - "70"
  - name: verify:test
    command: npm
    filter: "{src/**/*.ts,src/**/*.tsx}"
    args:
      - run
      - --silent
      - verify:test
  - name: verify:no-venv
    command: assist
    args:
      - verify
      - no-venv
  - name: verify:forbidden-strings
    command: assist
    args:
      - verify
      - forbidden-strings
  - name: verify:config-keys
    command: npm
    args:
      - run
      - --silent
      - verify:config-keys
  - name: verify:custom-lint
    command: assist
    filter: "{src/**/*.ts,src/**/*.tsx}"
    args:
      - lint
  - name: verify:react-build
    command: npm
    filter: "{src/commands/sessions/web/**,src/commands/backlog/web/ui/**}"
    args:
      - run
      - --silent
      - verify:react-build
  - name: verify:circular-deps
    command: npm
    quiet: true
    args:
      - run
      - --silent
      - verify:circular-deps
  - name: test:timestamp
    command: bash
    args:
      - -c
      - echo $(date --iso-8601=seconds) >> assist-test.txt
  - name: test:tail
    command: bash
    args:
      - -c
      - tail -f assist-test.txt
forbiddenStrings:
  - file: claude/settings.json
    paths:
      - permissions.allow
      - permissions.deny
    disallowed: "*assist*"
deny:
  - pattern: assist build
    message: STOP. Do not attempt any workaround. This is a verify command and must be run via /verify (the skill). Do not build, typecheck, or lint separately — invoke /verify now.
  - pattern: npx tsc
    message: STOP. Do not attempt any workaround. Typechecking is a verify command and must be run via /verify (the skill). Do not try tsc, build, or any alternative — invoke /verify now.
  - pattern: npx tsup
    message: STOP. Do not attempt any workaround. Building is a verify command and must be run via /verify (the skill). Do not try tsup, tsc, or any alternative — invoke /verify now.
  - pattern: npm run build
    message: STOP. Do not attempt any workaround. Building is a verify command and must be run via /verify (the skill). Do not try npm run, tsc, tsup, or any alternative — invoke /verify now.
