commit:
  conventional: true
  pull: true
  push: true
devlog:
  name: assist
notify:
  enabled: false
run:
  - name: verify:python-lint
    command: uv
    filter: src/commands/voice/python/**
    env:
      UV_PROJECT_ENVIRONMENT: ~/.assist/voice/.venv
    args:
      - run
      - --project
      - src/commands/voice/python
      - --extra
      - dev
      - ruff
      - check
      - src/commands/voice/python
  - name: verify:python-format
    command: uv
    filter: src/commands/voice/python/**
    env:
      UV_PROJECT_ENVIRONMENT: ~/.assist/voice/.venv
    args:
      - run
      - --project
      - src/commands/voice/python
      - --extra
      - dev
      - ruff
      - format
      - src/commands/voice/python
  - name: verify:maintainability-python
    command: uv
    filter: src/commands/voice/python/**
    env:
      UV_PROJECT_ENVIRONMENT: ~/.assist/voice/.venv
    args:
      - run
      - --project
      - src/commands/voice/python
      - --extra
      - dev
      - xenon
      - src/commands/voice/python
      - --max-absolute
      - C
  - name: verify:python-maintainability
    command: uv
    filter: src/commands/voice/python/**
    env:
      UV_PROJECT_ENVIRONMENT: ~/.assist/voice/.venv
    args:
      - run
      - --project
      - src/commands/voice/python
      - --extra
      - dev
      - python
      - src/commands/voice/python/check_mi.py
  - name: verify:lint
    command: npx
    filter: "{src/**,*.ts,*.json}"
    args:
      - biome
      - check
      - --write
      - src
  - name: verify:build
    command: npx
    args:
      - tsup
  - name: verify:types
    command: npx
    filter: "{src/**/*.ts,src/**/*.tsx,tsconfig.json}"
    args:
      - tsc
      - --noEmit
  - name: verify:knip
    command: npx
    filter: "{src/**/*.ts,src/**/*.tsx,package.json,knip.json}"
    args:
      - knip
      - --no-progress
      - --treat-config-hints-as-errors
  - name: verify:duplicate-code
    command: npx
    filter: "{src/**/*.ts,src/**/*.tsx,src/**/*.py}"
    args:
      - jscpd
      - --format
      - typescript,tsx,python
      - --exitCode
      - "1"
      - --ignore
      - "**/*.test.*,**/.venv/**"
      - -r
      - consoleFull
      - src
  - name: verify:maintainability-typescript
    command: assist
    filter: "{src/**/*.ts,src/**/*.tsx}"
    args:
      - complexity
      - maintainability
      - ./src
      - --threshold
      - "70"
  - name: verify:test
    command: npx
    filter: "{src/**/*.ts,src/**/*.tsx}"
    args:
      - vitest
      - run
      - --changed
      - --passWithNoTests
      - --reporter
      - dot
  - name: verify:no-venv
    command: assist
    args:
      - verify
      - no-venv
  - name: verify:custom-lint
    command: assist
    filter: "{src/**/*.ts,src/**/*.tsx}"
    args:
      - lint
  - name: verify:react-build
    command: npx
    filter: src/commands/backlog/web/**
    args:
      - esbuild
      - src/commands/backlog/web/ui/App.tsx
      - --bundle
      - --minify
      - --format=iife
      - --target=es2020
      - --outfile=dist/commands/backlog/web/bundle.js
      - --jsx=automatic
      - --jsx-import-source=react
      - --define:process.env.NODE_ENV='production'
