  description: The backlog web detail view doesn't render the plan, currentPhase, or manualChecks fields that were recently added to the schema. Add a read-only plan section below the acceptance criteria showing phases, tasks, verify steps, and manual checks, with the current phase visually indicated.
  acceptanceCriteria:
