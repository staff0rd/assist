  name: Refactor isApprovedRead tests to BDD style
  description: Restructure isApprovedRead.test.ts to follow BDD conventions with AAA pattern, when/should phrasing, and add missing coverage.
  acceptanceCriteria:
    - All describe blocks use when phrasing (e.g. describe("when the command is cd"))
    - All it blocks use should phrasing (e.g. it("should return a reason"))
    - Each test follows Arrange, Act, Assert with whitespace separation (no comments)
    - Each test has at most two closely related assertions
    - "Missing edge cases added: cd with trailing slash, cd with unusual whitespace"
    - Tests pass and /verify is green
  plan:
    - name: Restructure and extend tests
      tasks:
        - task: Rewrite describe blocks to use when phrasing grouped by scenario
          verify: npx vitest run src/shared/isApprovedRead.test.ts
        - task: Rewrite it blocks to use should phrasing
          verify: npx vitest run src/shared/isApprovedRead.test.ts
        - task: Separate each test into Arrange, Act, Assert with whitespace
          verify: npx vitest run src/shared/isApprovedRead.test.ts
        - task: Add tests for cd with trailing slash and unusual whitespace
          verify: npx vitest run src/shared/isApprovedRead.test.ts
      manualChecks:
        - Review test file reads naturally as a behaviour specification
  status: todo
