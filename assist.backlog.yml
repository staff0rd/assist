          verify: Plan section appears in the web detail view for items with a plan
        - task: Verify items with no plan show no plan section
          verify: Detail view for plan-less items renders without errors or empty sections
  status: todo
- id: 6
  type: story
  name: Auto-generate review phase for backlog items
  description: Automatically append a review phase to every backlog item when added. The review phase verifies all acceptance criteria against the implementation, asks the user to perform manual checks, marks the story done, calls /commit, then signals phase-done.
  acceptanceCriteria:
    - When a backlog item with a plan is added (via --json or interactive), a review phase is auto-appended
    - The review phase prompt instructs the agent to verify each acceptance criterion against the current code
    - The agent reports pass/fail per criterion before proceeding
    - The agent asks the user to confirm manual checks
    - After confirmation, the agent runs assist backlog done <id>, then /commit, then assist backlog phase-done
    - The review phase is always the last phase and is not editable by the author
    - Existing items without a review phase are unaffected (no migration)
  plan:
    - name: Auto-append review phase on add
      tasks:
        - task: "Create a helper function that generates the review phase object (name: Review, with a single task describing the review process)"
          verify: Helper returns a valid PlanPhase
        - task: Modify addFromJson in add/index.ts to append the review phase to items that have a plan
          verify: JSON-added items with a plan get the review phase appended
        - task: Interactive add does not add plans so no change needed there — add a comment clarifying this
          verify: Interactive add still works unchanged
    - name: Review phase prompt
      tasks:
        - task: Add a detection mechanism in buildPhasePrompt to identify the review phase (e.g. by name convention)
          verify: Review phase is correctly identified
        - task: Build a specialised prompt for the review phase that lists each AC and instructs the agent to verify against code
          verify: Prompt includes all acceptance criteria with verify instructions
        - task: "Prompt instructs the agent to: confirm manual checks, run assist backlog done, call /commit, then call phase-done"
          verify: Prompt contains the correct command sequence
    - name: Wiring and docs
      tasks:
        - task: Update run.ts completion message since the review phase now handles commit
          verify: No duplicate commit suggestion after review phase
        - task: Update README.md with documentation about the auto-generated review phase
          verify: README mentions the review phase behaviour
  status: todo
