- id: 4
  type: story
  name: Add refactor extract command
  description: Add assist refactor extract <file> <functionName> <destination> that uses ts-morph to move a function and its private dependencies from one file to a new file, updating all imports. Follows existing refactor patterns (dry-run by default, --apply to execute).
  acceptanceCriteria:
    - Extracts the named function and all same-file private (non-exported) functions it transitively depends on
    - Creates the destination file with the extracted functions and their required imports
    - Removes the extracted functions from the source file
    - Adds import { functionName } from "./destination" to the source file
    - Updates any other files that already import the function (if it was exported)
    - Adds the export to the nearest barrel index.ts if one exists in the destination directory
    - Dry-run by default showing what would happen, --apply to execute
    - assist verify passes after extraction with --apply
  plan:
    - name: Core extraction logic
      tasks:
        - task: Find the target function declaration in the source file using ts-morph
          verify: Function is located by name and type
        - task: Walk the same-file call graph to collect all private (non-exported) functions the target transitively depends on
          verify: All transitive private deps are identified
        - task: Resolve the required imports for the destination file (imports used by extracted functions)
          verify: Import list is complete and correct
    - name: File manipulation
      tasks:
        - task: Create the destination file with extracted functions and their required imports
          verify: Destination file compiles independently
        - task: Remove extracted functions from the source file
          verify: Source file still compiles
        - task: Add import of the extracted function to the source file
          verify: Source file references resolve
        - task: Update any other files that already import the function
          verify: No broken imports across project
        - task: Add export to nearest barrel index.ts if one exists in the destination directory
          verify: Barrel file exports the new function
    - name: Registration and wiring
      tasks:
        - task: Register the extract command under refactor with --apply flag
          verify: assist refactor extract --help works
        - task: Update README.md with new command documentation
        - task: Update CLAUDE.md refactor docs to mention extract command
        - task: Add read-only command to settings.json allow list
  status: done
- id: 5
  type: story
  name: Display plan and phase progress in backlog web view
  description: The backlog web detail view doesn't render the plan, currentPhase, or manualChecks fields that were recently added to the schema. Add a read-only plan section below the acceptance criteria showing phases, tasks, verify steps, and manual checks, with the current phase visually indicated.
  acceptanceCriteria:
    - Web UI BacklogItem type includes plan, currentPhase, and manualChecks
    - ItemBody renders a Plan section below acceptance criteria when plan is present
    - Each phase shows its name, tasks (with optional verify steps), and manual checks
    - The current phase (based on currentPhase) is visually highlighted; completed phases are marked as done
    - Items with no plan show no plan section (no empty state)
  plan:
    - name: Update types and plan component
      tasks:
        - task: Update the web UI BacklogItem type to match the core schema (add plan, currentPhase, manualChecks)
          verify: Type compiles and matches core BacklogItem
        - task: Create a read-only PlanSection component that renders phases, tasks, verify steps, and manual checks with current/completed phase indicators
          verify: Component renders correctly with sample data
    - name: Wire into detail view
      tasks:
        - task: Render PlanSection in ItemBody below acceptance criteria
          verify: Plan section appears in the web detail view for items with a plan
        - task: Verify items with no plan show no plan section
          verify: Detail view for plan-less items renders without errors or empty sections
  status: todo
- id: 6
  type: story
  name: Auto-generate review phase for backlog items
  description: Automatically append a review phase to every backlog item when added. The review phase verifies all acceptance criteria against the implementation, asks the user to perform manual checks, marks the story done, calls /commit, then signals phase-done.
  acceptanceCriteria:
    - When a backlog item with a plan is added (via --json or interactive), a review phase is auto-appended
    - The review phase prompt instructs the agent to verify each acceptance criterion against the current code
    - The agent reports pass/fail per criterion before proceeding
    - The agent asks the user to confirm manual checks
    - After confirmation, the agent runs assist backlog done <id>, then /commit, then assist backlog phase-done
    - The review phase is always the last phase and is not editable by the author
    - Existing items without a review phase are unaffected (no migration)
  plan:
    - name: Auto-append review phase on add
      tasks:
        - task: "Create a helper function that generates the review phase object (name: Review, with a single task describing the review process)"
          verify: Helper returns a valid PlanPhase
        - task: Modify addFromJson in add/index.ts to append the review phase to items that have a plan
          verify: JSON-added items with a plan get the review phase appended
        - task: Interactive add does not add plans so no change needed there — add a comment clarifying this
          verify: Interactive add still works unchanged
    - name: Review phase prompt
      tasks:
        - task: Add a detection mechanism in buildPhasePrompt to identify the review phase (e.g. by name convention)
          verify: Review phase is correctly identified
        - task: Build a specialised prompt for the review phase that lists each AC and instructs the agent to verify against code
          verify: Prompt includes all acceptance criteria with verify instructions
        - task: "Prompt instructs the agent to: confirm manual checks, run assist backlog done, call /commit, then call phase-done"
          verify: Prompt contains the correct command sequence
    - name: Wiring and docs
      tasks:
        - task: Update run.ts completion message since the review phase now handles commit
          verify: No duplicate commit suggestion after review phase
        - task: Update README.md with documentation about the auto-generated review phase
          verify: README mentions the review phase behaviour
  status: todo
